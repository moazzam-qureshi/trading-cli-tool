services:
  trade-cli:
    build: .
    image: trade-cli:latest
    container_name: trade-cli
    restart: unless-stopped

    # API keys + webhooks (never baked into image)
    env_file:
      - .env
    # Agent operation mode — LIVE. Agent will place real orders when the 3-layer
    # filter and gates all pass. Set "true" to revert to log-only.
    environment:
      AGENT_DRY_RUN: "false"

    # Persist mutable state across restarts/rebuilds
    volumes:
      - ./logs:/app/logs
      - ./trade_notes:/app/trade_notes
      - ./trades.csv:/app/trades.csv
      - ./state.json:/app/state.json
      - ./charts:/app/charts
      - claude-config:/home/trader/.claude

    # Optional: run a quick CLI command instead of the daemon
    # docker compose run --rm trade-cli python trade.py status

    # Resource limits — daemon is idle most of the time, but backtests can be CPU-heavy.
    # Box has 12 cores / 62 GB RAM; we leave headroom for the rest of the stack.
    mem_limit: 4g
    cpus: 8

    # Stop signal handling — tini in the image already handles this
    stop_grace_period: 15s

    # Healthcheck: daemon should write to log within 2 min of starting
    healthcheck:
      test: ["CMD-SHELL", "find logs/daemon.log -mmin -3 | grep -q daemon.log"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

# Named volume for claude-code login token — survives `docker compose up -d --build`
volumes:
  claude-config:
